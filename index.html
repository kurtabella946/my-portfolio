<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My GitHub Profile</title>
<style>
body{
    margin:0;
    padding:0;
    font-family:Arial, sans-serif;
    background:linear-gradient(to right,#141e30,#243b55);
    color:white;
    text-align:center;
}
.container{
    margin-top:80px;
}
.avatar{
    width:150px;
    height:150px;
    border-radius:50%;
    background:#00c6ff;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:60px;
    font-weight:bold;
    margin:auto;
    border:4px solid white;
}
h1{
    margin:15px 0 5px;
    font-size:40px;
}
p{
    font-size:18px;
    color:#ddd;
}
.btn{
    display:inline-block;
    margin-top:20px;
    padding:12px 25px;
    background:#00c6ff;
    color:white;
    text-decoration:none;
    border-radius:30px;
    transition:0.3s;
}
.btn:hover{
    background:#0072ff;
}
.skills{
    margin-top:30px;
}
.skills span{
    display:inline-block;
    background:white;
    color:#333;
    margin:5px;
    padding:8px 15px;
    border-radius:20px;
    font-size:14px;
}
</style>
</head>
<body>

<div class="container">
    <div class="avatar">K</div>

    <h1>Your Name</h1>
    <p>Aspiring Web Developer | Student | Future Teacher</p>

    <a href="https://github.com/yourusername" class="btn">Visit My GitHub</a>

    <div class="skills">
        <span>HTML</span>
        <span>CSS</span>
        <span>JavaScript</span>
        <span>Python</span>
    </div>
</div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kurt GitHub Profile</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
    background:linear-gradient(135deg,#141e30,#243b55);
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    text-align:center;
    background:rgba(255,255,255,0.08);
    padding:40px;
    border-radius:20px;
    box-shadow:0 10px 25px rgba(0,0,0,0.3);
    width:90%;
    max-width:450px;
}

.profile-img{
    width:170px;
    height:170px;
    border-radius:50%;
    object-fit:cover;
    border:5px solid #00c6ff;
    margin-bottom:20px;
}

h1{
    font-size:35px;
    margin-bottom:10px;
}

p{
    color:#ddd;
    font-size:18px;
    margin-bottom:20px;
}

.btn{
    display:inline-block;
    padding:12px 28px;
    background:#00c6ff;
    color:white;
    text-decoration:none;
    border-radius:30px;
    transition:0.3s;
    margin-top:10px;
}

.btn:hover{
    background:#0072ff;
}

.skills{
    margin-top:25px;
}

.skills span{
    display:inline-block;
    background:white;
    color:#333;
    padding:8px 15px;
    margin:5px;
    border-radius:20px;
    font-size:14px;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<img src="yourphoto.jpg" alt="Profile Picture" class="profile-img">

<h1>Kurt</h1>
<p>Aspiring Web Developer | Student | Future Teacher</p>

<a href="https://github.com/yourusername" class="btn">Visit My GitHub</a>

<div class="skills">
<span>HTML</span>
<span>CSS</span>
<span>JavaScript</span>
<span>Python</span>
</div>

</div>

</body>
</html>
